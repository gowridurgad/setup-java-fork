name: sap

on:
  push:
    branches:
      - testing-snap
  pull_request:
    branches:
      - testing-snap

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'sapmachine'
          java-version: '21'
